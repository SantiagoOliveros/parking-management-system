<mat-sidenav-container class="layout-container">

  <mat-sidenav mode="side" opened class="sidenav">

    <div class="logo-container">
      <h2>Parking App</h2>
    </div>

    <mat-nav-list>

      <a mat-list-item routerLink="/">
        <mat-icon>dashboard</mat-icon>
        <span>Dashboard</span>
      </a>

      <a mat-list-item routerLink="/register-entry">
        <mat-icon>add_circle</mat-icon>
        <span>Register Entry</span>
      </a>

      <a mat-list-item routerLink="/active-vehicles">
        <mat-icon>directions_car</mat-icon>
        <span>Active Vehicles</span>
      </a>

      <a mat-list-item routerLink="/register-exit">
        <mat-icon>exit_to_app</mat-icon>
        <span>Register Exit</span>
      </a>

    </mat-nav-list>

  </mat-sidenav>

  <mat-sidenav-content>

    <mat-toolbar color="primary">

      <span>Parking Management System</span>

    </mat-toolbar>

    <div class="content">

      <router-outlet></router-outlet>

    </div>

  </mat-sidenav-content>

</mat-sidenav-container>
