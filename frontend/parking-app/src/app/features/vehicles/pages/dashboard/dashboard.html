<div class="dashboard-header">

  <h1>Dashboard</h1>

  <p>
    Parking management overview and real-time statistics
  </p>

</div>

<div class="stats-grid">

  <!-- Total Active -->

  <mat-card class="stats-card">

    <div class="card-content">

      <div>

        <h2>
          {{ stats.totalActiveVehicles }}
        </h2>

        <p>
          Active Vehicles
        </p>

      </div>

      <mat-icon>
        directions_car
      </mat-icon>

    </div>

  </mat-card>

  <!-- Cars -->

  <mat-card class="stats-card">

    <div class="card-content">

      <div>

        <h2>
          {{ stats.totalCars }}
        </h2>

        <p>
          Cars
        </p>

      </div>

      <mat-icon>
        local_taxi
      </mat-icon>

    </div>

  </mat-card>

  <!-- Motorcycles -->

  <mat-card class="stats-card">

    <div class="card-content">

      <div>

        <h2>
          {{ stats.totalMotorcycles }}
        </h2>

        <p>
          Motorcycles
        </p>

      </div>

      <mat-icon>
        two_wheeler
      </mat-icon>

    </div>

  </mat-card>

  <!-- Revenue -->

  <mat-card class="stats-card revenue-card">

    <div class="card-content">

      <div>

        <h2>
          ${{ stats.estimatedRevenue }}
        </h2>

        <p>
          Estimated Revenue
        </p>

      </div>

      <mat-icon>
        attach_money
      </mat-icon>

    </div>

  </mat-card>

</div>
