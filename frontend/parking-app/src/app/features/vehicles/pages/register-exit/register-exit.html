<div class="page-container">

  <mat-card class="form-card">

    <div class="header-section">

      <h2>Register Vehicle Exit</h2>

      <p>
        Register vehicle departure and calculate parking fee
      </p>

    </div>

    <form
      [formGroup]="form"
      (ngSubmit)="submit()"
      class="exit-form">

      <mat-form-field appearance="outline">

        <mat-label>Plate</mat-label>

        <input
          matInput
          type="text"
          formControlName="plate"
          placeholder="ABC123" />

        <mat-error
          *ngIf="form.get('plate')?.invalid">

          Plate is required

        </mat-error>

      </mat-form-field>

      <button
        mat-raised-button
        color="primary"
        type="submit"
        [disabled]="loading || form.invalid">

        {{ loading ? 'Processing...' : 'Register Exit' }}

      </button>

    </form>

  </mat-card>

</div>
