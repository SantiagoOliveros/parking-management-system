<h2>Active Vehicles</h2>

<div
  class="loading-container"
  *ngIf="loading">

  <mat-spinner diameter="50"></mat-spinner>

</div>

<div *ngIf="!loading">

  <table
    mat-table
    [dataSource]="vehicles"
    class="mat-elevation-z4 vehicles-table">

    <!-- Plate -->

    <ng-container matColumnDef="plate">

      <th mat-header-cell *matHeaderCellDef>
        Plate
      </th>

      <td mat-cell *matCellDef="let vehicle">
        {{ vehicle.plate }}
      </td>

    </ng-container>

    <!-- Vehicle Type -->

    <ng-container matColumnDef="vehicleType">

      <th mat-header-cell *matHeaderCellDef>
        Type
      </th>

      <td mat-cell *matCellDef="let vehicle">

        <mat-chip>
          {{ vehicle.vehicleType }}
        </mat-chip>

      </td>

    </ng-container>

    <!-- Entry Time -->

    <ng-container matColumnDef="entryTime">

      <th mat-header-cell *matHeaderCellDef>
        Entry Time
      </th>

      <td mat-cell *matCellDef="let vehicle">

        {{ vehicle.entryTime | date:'medium' }}

      </td>

    </ng-container>

    <!-- Actions -->

    <ng-container matColumnDef="actions">

      <th mat-header-cell *matHeaderCellDef>
        Actions
      </th>

      <td mat-cell *matCellDef="let vehicle">

        <button
          mat-raised-button
          color="primary"
          (click)="registerExit(vehicle.plate)">

          Register Exit

        </button>

      </td>

    </ng-container>

    <tr
      mat-header-row
      *matHeaderRowDef="displayedColumns">
    </tr>

    <tr
      mat-row
      *matRowDef="let row; columns: displayedColumns;">
    </tr>

  </table>

  <div
    *ngIf="vehicles.length === 0"
    class="empty-state">

    No active vehicles

  </div>

</div>
